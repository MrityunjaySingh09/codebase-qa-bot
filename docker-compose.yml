version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: codebase-qa-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull models on startup
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull llama3 &&
             ollama pull nomic-embed-text &&
             wait"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app:
    build: .
    container_name: codebase-qa-app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data          # persist ChromaDB + cloned repos
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
